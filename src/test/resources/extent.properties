# Extent Report Configuration for Cucumber 7 with ExtentCucumberAdapter
extent.reporter.html.start=true
extent.reporter.html.out=target/extent-reports/extent-report.html
extent.reporter.html.config=src/test/resources/extent-config.xml

# Report theme (dark or standard)
extent.reporter.html.theme=dark

# Report title
extent.reporter.html.reportName=SauceDemo Automation Test Report

# Project name
extent.projectName=SauceDemo Automation Testing Framework

# Report description
extent.reportDescription=Comprehensive automation test execution report with detailed logs and screenshots

# Screenshots on pass
extent.screenshot.on.pass=false

# Screenshots on fail
extent.screenshot.on.fail=true

# System information
extent.systeminfo.HostName=LocalMachine
extent.systeminfo.Environment=QA
extent.systeminfo.Browser=Chrome
extent.systeminfo.OS=Windows
extent.systeminfo.ExecutionType=Automated
extent.systeminfo.TestFramework=Cucumber + Selenium + JUnit
extent.systeminfo.Application=SauceDemo Automation

# Enable step-level logs
extent.report.log.level=info
